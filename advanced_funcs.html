    let timeoutID;
    function handleCart() {
      clearTimeout(timeoutID);

      const cartBtn = document.querySelector('.cartItem');
      cartBtn.innerText = 'Added';
      timeoutID = setTimeout(() => {
        cartBtn.innerText = '';
      },6000);
    }
  
    //document title
    
    let titles = ['Advanced Functions', 'App', '(2) New Messages', 'Exercises', 'Tutorials'];
    let currentIndex = 0;
    let maxItems = titles.length; 

    function titleSelectn() {
      setInterval(() => {
        if (maxItems > 0) {
          document.title = titles[currentIndex];
          currentIndex = (currentIndex + 1) % maxItems;
        } else {
          document.title = 'No Messages';
        }
      }, 1000);
    }

    function handleTitleCnt(action) {
      if (action === 'add') {
        if (maxItems < titles.length) {
          maxItems++;
        }
      } else if (action === 'remove') {
        if (maxItems > 0) {
          maxItems--;
          if (currentIndex >= maxItems) {
            currentIndex = 0;
          }
        }
      }
    }

    titleSelectn();
    
    document.querySelector('.js-add-btn').addEventListener(('click'), ()=> {
      handleTitleCnt('add');
    });
    
    document.querySelector('.js-remove-btn').addEventListener(('click'), ()=> {
      handleTitleCnt('remove');
    });
