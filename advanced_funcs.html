  <script>
    /*

    function handleCommand(){
      const cmdBtn = document.querySelector('.command');
      const previousTxt = cmdBtn.innerText;

      cmdBtn.innerText = 'Loading...';
      setTimeout(() => {
          cmdBtn.innerText = (previousTxt === 'Start') ? 'Finished!' : 'Start';
        }, 1000);
    }

    let timeoutID;
    function handleCart() {
      clearTimeout(timeoutID);

      const cartBtn = document.querySelector('.cartItem');
      cartBtn.innerText = 'Added';
      timeoutID = setTimeout(() => {
        cartBtn.innerText = '';
      },6000);
    }
  
    //document title
    
    let titles = ['Advanced Functions', 'App', '(2) New Messages', 'Exercises', 'Tutorials'];
    let currentIndex = 0;
    let maxItems = titles.length; 

    function titleSelectn() {
      setInterval(() => {
        if (maxItems > 0) {
          document.title = titles[currentIndex];
          currentIndex = (currentIndex + 1) % maxItems;
        } else {
          document.title = 'No Messages';
        }
      }, 1000);
    }

    function handleTitleCnt(action) {
      if (action === 'add') {
        if (maxItems < titles.length) {
          maxItems++;
        }
      } else if (action === 'remove') {
        if (maxItems > 0) {
          maxItems--;
          if (currentIndex >= maxItems) {
            currentIndex = 0;
          }
        }
      }
    }

    titleSelectn();

    //shorthand for functions in objects 
    const obj1 = {
      method(){}
      //this is not easier to read=> method: () => {}
    };
 
    */
  
    /*
      .filter() :-
      it creates a new array
      if its inner function returns true, it stores the value in the created array
    */

    console.log([1, -3, 5].filter((value, index) => {
      return (value >= 0);
    })); //logged array = [1,5]

    /* 
      .map() - it transforms an array into another array():-
      creates a new array
      whatever is returned is added to the created array
    */
    
    console.log(  
      [1, 1, 3].map((value, index) => {
        return value + value;   
      })
    );
  </script>
