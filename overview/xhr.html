<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <script>
    const xhr = new XMLHttpRequest();
    xhr.addEventListener('load', () => {
      console.log(xhr.response);
    })
    xhr.open('GET', 'https://supersimplebackend.dev/greeting');
    xhr.send();

    //in fetch
    const response = fetch('https://superSimplebackend.dev/greeting').then((response) => response.text());

    //in async await, and fetch for GET
    async function greeting() {
      const response2 = 
      await fetch('https://superSimplebackend.dev/greeting')

      const result = await response2.text();
      console.log(result);
    }

    //fetch, async await for POST
    async function greeting2() {
      try {
        const response3 = 
        await fetch('https://superSimplebackend.dev/greeting', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: 'Oluwatunmise'
          })
        })

        const result = await response3.text();
        if(result3.status >= 400) throw new Error('Bad response from server');

        console.log(result); 
      } catch(error) {
        console.log(`Error detected: ${error}`);
      }


    }

    async function amazon() {
      try {  
        const response = await fetch('https:amazon.com')
        .then((result) => {
          console.log(result.json());
        })
      }
      catch (error) {
        console.log(`CORS Error detected: ${error}`);
      }

    }
    
    amazon();
    greeting();
    greeting2();
  </script>
</body>
</html>
