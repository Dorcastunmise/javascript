<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
</head>
<body>

  <p>Rock <span>=></span> Paper <span>=></span> Scissors</p>
  <button onclick="RockClick('rock')">Rock</button>
  <button onclick="PaperClick('paper')">Paper</button>
  <button onclick="ScissorsClick('scissors')">Scissors</button>


  <script>
    
    randomNo = Math.random();
    let computerMove = '';

    if(randomNo >= 0 && randomNo < 1/3) {
      computerMove = 'rock';
    }
    else if(randomNo >= 1/3 && randomNo < 2/3){ 
      computerMove = 'paper';
    }
    else if(randomNo >= 2/3 && randomNo < 1) {
      computerMove = 'scissors';
    }

    console.log(computerMove);
    function BtnClick(data){
      if(computerMove === 'rock' && data === 'rock') alert(`You picked ${data} while the computer picked ${computerMove}. Tie!`);
      else if(computerMove === 'rock' && data === 'paper') alert(`You picked ${data} while the computer picked ${computerMove}. You Win!`);
      else if(computerMove === 'rock' && data === 'scissors') alert(`You picked ${data} while the computer picked ${computerMove}. You Lose!`);

      else if(computerMove === 'paper' && data === 'rock') alert(`You picked ${data} while the computer picked ${computerMove}. You Lose!`);
      else if(computerMove === 'paper' && data === 'paper') alert(`You picked ${data} while the computer picked ${computerMove}. Tie!`);
      else if(computerMove === 'paper' && data === 'scissors') alert(`You picked ${data} while the computer picked ${computerMove}. You Win!`);

      else if(computerMove === 'scissors' && data === 'rock') alert(`You picked ${data} while the computer picked ${computerMove}. You Win!`);
      else if(computerMove === 'scissors' && data === 'paper') alert(`You picked ${data} while the computer picked ${computerMove}. You Lose!`);
      else if(computerMove === 'scissors' && data === 'scissors') alert(`You picked ${data} while the computer picked ${computerMove}. Tie!`);
    }

    function RockClick(data){
      BtnClick(data);
    }

    function PaperClick(data){
      BtnClick(data);
    }

    function ScissorsClick(data){
      BtnClick(data);
    }

  </script>
  
</body>
</html>
